name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  black-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black pytest pytest-cov

      - name: Run Black in check mode
        run: |
          black --check .

      - name: Run unit tests
        run: |
          pytest --cov=app --cov-report=term-missing --cov-fail-under=85

  trivy-scan:
    runs-on: ubuntu-latest
    needs: black-and-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: local/rate-limiter-service:ci

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: local/rate-limiter-service:ci
          format: table
          output: trivy-report.txt
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

      - name: Trivy summary and warning
        run: |
          echo "## Trivy vulnerability scan" >> "$GITHUB_STEP_SUMMARY"
          if grep -E 'CRITICAL|HIGH' trivy-report.txt > /dev/null; then
            echo "::warning::Trivy found CRITICAL/HIGH vulnerabilities. See 'trivy-report.txt' artifact and summary." 
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Trivy found CRITICAL/HIGH vulnerabilities (CRITICAL/HIGH severities)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No CRITICAL or HIGH vulnerabilities found." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          sed -n '1,40p' trivy-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

